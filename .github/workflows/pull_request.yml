name: Android CI - Build APK & AAB

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 2️⃣ Setup JDK
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3️⃣ Cache Gradle (speed up build)
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: gradle-

      # 4️⃣ Grant permission
      - name: Grant execute permission
        run: chmod +x gradlew

      # 5️⃣ Clean project
      - name: Clean
        run: ./gradlew clean

      # 6️⃣ Build Debug APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # 7️⃣ Build Release APK
      - name: Build Release APK
        run: ./gradlew assembleRelease

      # 8️⃣ Build Release AAB (Play Store)
      - name: Build Release AAB
        run: ./gradlew bundleRelease

      # 9️⃣ Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: APK
          path: app/build/outputs/apk/**/*.apk

      # 🔟 Upload AAB
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: AAB
          path: app/build/outputs/bundle/**/*.aab